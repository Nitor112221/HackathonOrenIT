<div class="card">
    <div class="card-body">
        <h5 class="card-title">Текстовая лекция</h5>
        <div class="card-text">
            {{ fragment.data.content|safe }}
        </div>
        <form hx-post="{% url 'complete_fragment' fragment.id %}" hx-target="#fragment-container" hx-swap="innerHTML">
            {% csrf_token %}
            <button class="btn btn-success mt-3" type="submit">
                Отметить как пройденное
            </button>
        </form>
    </div>
</div>
