{% extends 'base.html' %}

{% block title %}Модули | CodeLand{% endblock %}

{% block content %}
<h1 class="mb-4">Модули</h1>
<div class="row">
    {% for module in modules %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">{{ module.title }}</h5>
                <p class="card-text">{{ module.description|truncatechars:100 }}</p>
                <a href="{% url 'lesson_list' module.id %}" class="btn btn-primary">Перейти</a>
            </div>
        </div>
    </div>
    {% empty %}
    <p>Модули пока не добавлены.</p>
    {% endfor %}
</div>
{% endblock %}
