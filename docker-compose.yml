version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 5

  app:
    build: .
    volumes:
      - .:/app
      - sqlite_data:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - CELERY_REDIS_HOST=redis
      - CELERY_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env


volumes:
  sqlite_data: